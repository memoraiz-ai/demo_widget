<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Template</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #ffffff;
            color: #303136;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            background-color: #ffffff;
            border: 1px solid #dfe1e6;
            border-radius: 4px;
            padding: 24px 16px;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .headline {
            font-family: 'Geist', sans-serif;
            font-weight: 500;
            font-size: 20px;
            line-height: 28px;
            color: #111111;
            letter-spacing: -0.4px;
        }

        .progress-section {
            display: flex;
            align-items: center;
            gap: 18px;
            width: 100%;
        }

        .progress-counter {
            font-family: 'Geist', sans-serif;
            font-weight: 400;
            font-size: 16px;
            line-height: 24px;
            color: #111111;
        }

        .progress-bar {
            flex: 1;
            background-color: #dfe1e6;
            height: 8px;
            border-radius: 9999px;
            overflow: hidden;
        }

        .progress-fill {
            background-color: #21578c;
            height: 100%;
            width: 80%;
            border-radius: 40px;
        }

        .timer {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .timer-icon {
            width: 20px;
            height: 20px;
        }

        .timer-text {
            font-family: 'Geist', sans-serif;
            font-weight: 400;
            font-size: 16px;
            line-height: 24px;
            color: #303136;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        .action-button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border: none;
            background: none;
            cursor: pointer;
            font-family: 'Geist', sans-serif;
            font-weight: 400;
            font-size: 14px;
            line-height: 20px;
            color: #111111;
        }

        .action-icon {
            width: 20px;
            height: 20px;
        }

        .content {
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .question {
            font-family: 'Geist', sans-serif;
            font-weight: 400;
            font-size: 18px;
            line-height: 28px;
            color: #303136;
            width: 100%;
        }

        .answers {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .answer-option {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            cursor: pointer;
        }

        .radio-button {
            width: 16px;
            height: 16px;
            border: 1px solid #b4b8c5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            flex-shrink: 0;
        }

        .radio-button.selected {
            border-color: #21578c;
        }

        .radio-dot {
            width: 8px;
            height: 8px;
            background-color: #21578c;
            border-radius: 50%;
            display: none;
        }

        .radio-button.selected .radio-dot {
            display: block;
        }

        .answer-text {
            font-family: 'Geist', sans-serif;
            font-weight: 400;
            font-size: 14px;
            line-height: 20px;
            color: #303136;
        }

        .feedback {
            background-color: #a2b99c;
            border-radius: 4px;
            padding: 12px 16px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .feedback-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .feedback-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .feedback-title {
            font-family: 'Geist', sans-serif;
            font-weight: 500;
            font-size: 16px;
            line-height: 24px;
            color: #121c12;
        }

        .feedback-message {
            font-family: 'Geist', sans-serif;
            font-weight: 400;
            font-size: 14px;
            line-height: 20px;
            color: #121c12;
        }

        .feedback-score {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            color: #121c12;
        }

        .score-points {
            font-family: 'Geist', sans-serif;
            font-weight: 600;
            font-size: 20px;
            line-height: 28px;
            letter-spacing: -0.4px;
        }

        .score-total {
            font-family: 'Geist', sans-serif;
            font-weight: 400;
            font-size: 14px;
            line-height: 20px;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .nav-button {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 12px 20px;
            border-radius: 4px;
            font-family: 'Geist', sans-serif;
            font-weight: 400;
            font-size: 18px;
            line-height: 28px;
            cursor: pointer;
            height: 52px;
            text-decoration: none;
        }

        .prev-button {
            border: 1px solid #b4b8c5;
            background: none;
            color: #21466e;
        }

        .next-button {
            background-color: #21578c;
            color: #ffffff;
            border: none;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
        }

        .feedback.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="header">
            <div class="headline">Quiz headline</div>
            <div class="progress-section">
                <div class="progress-counter">8/10</div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <div class="timer">
                    <svg class="timer-icon" viewBox="0 0 20 20" fill="none">
                        <circle cx="10" cy="10" r="8" stroke="#303136" stroke-width="2"/>
                        <path d="M10 6V10L13 13" stroke="#303136" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <div class="timer-text">01:25</div>
                </div>
            </div>
            <div class="actions">
                <button class="action-button">
                    <span>Casual Order</span>
                    <svg class="action-icon" viewBox="0 0 20 20" fill="none">
                        <path d="M5 8h10M8 5l3 3-3 3" stroke="#111111" stroke-width="2" stroke-linecap="round"/>
                        <path d="M15 12H5m3-3l-3 3 3 3" stroke="#111111" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
                <button class="action-button">
                    <span>Rephrase it</span>
                    <svg class="action-icon" viewBox="0 0 20 20" fill="none">
                        <path d="M10 4v6l4 2M4 10a6 6 0 0 0 12 0" stroke="#111111" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="content">
            <div class="question">The largest planet in our solar system is _______.</div>

            <div class="answers">
                <div class="answer-option" onclick="selectAnswer(this)">
                    <div class="radio-button">
                        <div class="radio-dot"></div>
                    </div>
                    <div class="answer-text">Earth</div>
                </div>
                <div class="answer-option" onclick="selectAnswer(this)">
                    <div class="radio-button">
                        <div class="radio-dot"></div>
                    </div>
                    <div class="answer-text">Jupiter</div>
                </div>
                <div class="answer-option" onclick="selectAnswer(this)">
                    <div class="radio-button">
                        <div class="radio-dot"></div>
                    </div>
                    <div class="answer-text">Saturn</div>
                </div>
                <div class="answer-option" onclick="selectAnswer(this)">
                    <div class="radio-button">
                        <div class="radio-dot"></div>
                    </div>
                    <div class="answer-text">Mars</div>
                </div>
                <div class="answer-option" onclick="selectAnswer(this)">
                    <div class="radio-button">
                        <div class="radio-dot"></div>
                    </div>
                    <div class="answer-text">Neptune</div>
                </div>
            </div>
        </div>

        <div class="feedback hidden" id="feedback">
            <svg class="feedback-icon" viewBox="0 0 20 20" fill="none">
                <path d="M10 2l2.39 4.84L18 7.46l-4 3.9.94 5.5L10 14.24 5.06 16.86l.94-5.5-4-3.9 5.61-.62L10 2z" fill="#121c12" stroke="#121c12" stroke-width="2"/>
            </svg>
            <div class="feedback-content">
                <div class="feedback-title">Amazing!</div>
                <div class="feedback-message">You got it right! Jupiter is indeed the largest planet in our solar system.</div>
            </div>
            <div class="feedback-score">
                <div class="score-points">+25p</div>
                <div class="score-total">125/500</div>
            </div>
        </div>

        <div class="navigation">
            <button class="nav-button prev-button">
                <svg class="nav-icon" viewBox="0 0 20 20" fill="none">
                    <path d="M12 5l-5 5 5 5" stroke="#21466e" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span>Previous</span>
            </button>
            <button class="nav-button next-button">
                <span>Next</span>
                <svg class="nav-icon" viewBox="0 0 20 20" fill="none">
                    <path d="M8 5l5 5-5 5" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        function selectAnswer(element) {
            // Remove selected class from all options
            const allOptions = document.querySelectorAll('.answer-option');
            allOptions.forEach(option => {
                option.querySelector('.radio-button').classList.remove('selected');
            });

            // Add selected class to clicked option
            element.querySelector('.radio-button').classList.add('selected');

            // Show feedback after a short delay
            setTimeout(() => {
                document.getElementById('feedback').classList.remove('hidden');
            }, 500);
        }

        // Timer functionality
        let seconds = 85;
        const timerElement = document.querySelector('.timer-text');

        setInterval(() => {
            seconds--;
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;

            if (seconds <= 0) {
                seconds = 0;
                timerElement.textContent = "00:00";
            }
        }, 1000);
    </script>
</body>
</html>
