<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outlined Quiz Template</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #ffffff;
            color: #303136;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            background-color: #ffffff;
            border: 1px solid #dfe1e6;
            border-radius: 4px;
            padding: 24px 16px;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .headline {
            font-family: 'Geist', sans-serif;
            font-weight: 500;
            font-size: 20px;
            line-height: 28px;
            color: #111111;
            letter-spacing: -0.4px;
        }

        .progress-section {
            display: flex;
            align-items: center;
            gap: 18px;
            width: 100%;
        }

        .progress-counter {
            font-family: 'Geist', sans-serif;
            font-weight: 400;
            font-size: 16px;
            line-height: 24px;
            color: #111111;
        }

        .progress-bar {
            flex: 1;
            background-color: #dfe1e6;
            height: 8px;
            border-radius: 9999px;
            overflow: hidden;
        }

        .progress-fill {
            background-color: #21578c;
            height: 100%;
            width: 80%;
            border-radius: 40px;
        }

        .timer {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .timer-icon {
            width: 20px;
            height: 20px;
        }

        .timer-text {
            font-family: 'Geist', sans-serif;
            font-weight: 400;
            font-size: 16px;
            line-height: 24px;
            color: #303136;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        .action-button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border: none;
            background: none;
            cursor: pointer;
            font-family: 'Geist', sans-serif;
            font-weight: 400;
            font-size: 14px;
            line-height: 20px;
            color: #111111;
        }

        .action-icon {
            width: 20px;
            height: 20px;
        }

        .content {
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .question {
            font-family: 'Geist', sans-serif;
            font-weight: 400;
            font-size: 18px;
            line-height: 28px;
            color: #303136;
            width: 100%;
        }

        .answers {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .answer-box {
            border: 1px solid #dfe1e6;
            border-radius: 4px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: #ffffff;
        }

        .answer-box:hover {
            border-color: #21578c;
            background-color: #f8f9fa;
        }

        .answer-box.selected {
            background-color: #a2b99c;
            border-color: #a2b99c;
        }

        .answer-box .answer-text {
            font-family: 'Geist', sans-serif;
            font-weight: 400;
            font-size: 16px;
            line-height: 24px;
            color: #303136;
            flex: 1;
        }

        .answer-box.selected .answer-text {
            color: #111111;
        }

        .answer-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            display: none;
        }

        .answer-box.selected .answer-icon {
            display: block;
        }

        .feedback {
            background-color: #a2b99c;
            border-radius: 4px;
            padding: 12px 16px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .feedback.hidden {
            display: none;
        }

        .feedback-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .feedback-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .feedback-title {
            font-family: 'Geist', sans-serif;
            font-weight: 500;
            font-size: 16px;
            line-height: 24px;
            color: #121c12;
        }

        .feedback-message {
            font-family: 'Geist', sans-serif;
            font-weight: 400;
            font-size: 14px;
            line-height: 20px;
            color: #121c12;
        }

        .feedback-score {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            color: #121c12;
        }

        .score-points {
            font-family: 'Geist', sans-serif;
            font-weight: 600;
            font-size: 20px;
            line-height: 28px;
            letter-spacing: -0.4px;
        }

        .score-total {
            font-family: 'Geist', sans-serif;
            font-weight: 400;
            font-size: 14px;
            line-height: 20px;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .nav-button {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 12px 20px;
            border-radius: 4px;
            font-family: 'Geist', sans-serif;
            font-weight: 400;
            font-size: 18px;
            line-height: 28px;
            cursor: pointer;
            height: 52px;
            text-decoration: none;
        }

        .prev-button {
            border: 1px solid #b4b8c5;
            background: none;
            color: #21466e;
        }

        .next-button {
            background-color: #21578c;
            color: #ffffff;
            border: none;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
        }

        .instructions {
            font-family: 'Geist', sans-serif;
            font-weight: 400;
            font-size: 14px;
            line-height: 20px;
            color: #666;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="header">
            <div class="headline">Quiz headline</div>
            <div class="progress-section">
                <div class="progress-counter">8/10</div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <div class="timer">
                    <svg class="timer-icon" viewBox="0 0 20 20" fill="none">
                        <circle cx="10" cy="10" r="8" stroke="#303136" stroke-width="2"/>
                        <path d="M10 6V10L13 13" stroke="#303136" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <div class="timer-text">01:25</div>
                </div>
            </div>
            <div class="actions">
                <button class="action-button">
                    <span>Casual Order</span>
                    <svg class="action-icon" viewBox="0 0 20 20" fill="none">
                        <path d="M5 8h10M8 5l3 3-3 3" stroke="#111111" stroke-width="2" stroke-linecap="round"/>
                        <path d="M15 12H5m3-3l-3 3 3 3" stroke="#111111" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
                <button class="action-button">
                    <span>Rephrase it</span>
                    <svg class="action-icon" viewBox="0 0 20 20" fill="none">
                        <path d="M10 4v6l4 2M4 10a6 6 0 0 0 12 0" stroke="#111111" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="content">
            <div class="question">The largest planet in our solar system is _______.</div>

            <div class="answers">
                <div class="answer-box" onclick="selectAnswer(this)">
                    <div class="answer-text">Mercury</div>
                    <svg class="answer-icon" viewBox="0 0 20 20" fill="none">
                        <path d="M16 5l-9 9-3-3" stroke="#111111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="answer-box" onclick="selectAnswer(this)">
                    <div class="answer-text">Venus</div>
                    <svg class="answer-icon" viewBox="0 0 20 20" fill="none">
                        <path d="M16 5l-9 9-3-3" stroke="#111111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="answer-box selected" onclick="selectAnswer(this)">
                    <div class="answer-text">Jupiter</div>
                    <svg class="answer-icon" viewBox="0 0 20 20" fill="none">
                        <path d="M16 5l-9 9-3-3" stroke="#111111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="answer-box" onclick="selectAnswer(this)">
                    <div class="answer-text">Saturn</div>
                    <svg class="answer-icon" viewBox="0 0 20 20" fill="none">
                        <path d="M16 5l-9 9-3-3" stroke="#111111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="answer-box" onclick="selectAnswer(this)">
                    <div class="answer-text">Neptune</div>
                    <svg class="answer-icon" viewBox="0 0 20 20" fill="none">
                        <path d="M16 5l-9 9-3-3" stroke="#111111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="feedback" id="feedback">
            <svg class="feedback-icon" viewBox="0 0 20 20" fill="none">
                <path d="M10 2l2.39 4.84L18 7.46l-4 3.9.94 5.5L10 14.24 5.06 16.86l.94-5.5-4-3.9 5.61-.62L10 2z" fill="#121c12" stroke="#121c12" stroke-width="2"/>
            </svg>
            <div class="feedback-content">
                <div class="feedback-title">Amazing!</div>
                <div class="feedback-message">You got it right! Jupiter is indeed the largest planet in our solar system, with a diameter of about 88,846 miles (142,984 kilometers).</div>
            </div>
            <div class="feedback-score">
                <div class="score-points">+25p</div>
                <div class="score-total">125/500</div>
            </div>
        </div>

        <div class="navigation">
            <button class="nav-button prev-button">
                <svg class="nav-icon" viewBox="0 0 20 20" fill="none">
                    <path d="M12 5l-5 5 5 5" stroke="#21466e" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span>Previous</span>
            </button>
            <button class="nav-button next-button">
                <span>Next</span>
                <svg class="nav-icon" viewBox="0 0 20 20" fill="none">
                    <path d="M8 5l5 5-5 5" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        let selectedAnswer = null;

        function selectAnswer(element) {
            // Remove selected class from all boxes
            const allBoxes = document.querySelectorAll('.answer-box');
            allBoxes.forEach(box => {
                box.classList.remove('selected');
            });

            // Add selected class to clicked box
            element.classList.add('selected');
            selectedAnswer = element.querySelector('.answer-text').textContent;

            // Show feedback after a short delay
            setTimeout(() => {
                checkAnswer();
            }, 300);
        }

        function checkAnswer() {
            const feedback = document.getElementById('feedback');

            if (selectedAnswer === 'Jupiter') {
                feedback.style.display = 'flex';
                feedback.querySelector('.feedback-title').textContent = 'Amazing!';
                feedback.querySelector('.feedback-message').textContent = 'You got it right! Jupiter is indeed the largest planet in our solar system, with a diameter of about 88,846 miles (142,984 kilometers).';
                feedback.querySelector('.score-points').textContent = '+25p';
                feedback.querySelector('.score-total').textContent = '150/500';
            } else {
                feedback.style.display = 'flex';
                feedback.style.backgroundColor = '#ff9359';
                feedback.querySelector('.feedback-title').textContent = 'Not quite';
                feedback.querySelector('.feedback-message').textContent = 'Jupiter is actually the largest planet in our solar system. It\'s more than twice as massive as all the other planets combined!';
                feedback.querySelector('.score-points').textContent = '+0p';
                feedback.querySelector('.score-total').textContent = '125/500';

                // Update colors for error feedback
                feedback.querySelector('.feedback-content').style.color = '#440a06';
                feedback.querySelector('.feedback-title').style.color = '#440a06';
                feedback.querySelector('.feedback-message').style.color = '#440a06';
                feedback.querySelector('.feedback-score').style.color = '#440a06';
            }
        }

        // Timer functionality
        let seconds = 85;
        const timerElement = document.querySelector('.timer-text');

        setInterval(() => {
            seconds--;
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;

            if (seconds <= 0) {
                seconds = 0;
                timerElement.textContent = "00:00";
            }
        }, 1000);

        // Shuffle functionality
        document.querySelector('.action-button').addEventListener('click', function() {
            const answers = document.querySelectorAll('.answer-box');
            const answersArray = Array.from(answers);

            // Shuffle array
            for (let i = answersArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [answersArray[i], answersArray[j]] = [answersArray[j], answersArray[i]];
            }

            // Re-append in shuffled order
            const container = document.querySelector('.answers');
            answersArray.forEach(answer => {
                container.appendChild(answer);
            });
        });

        // Rephrase functionality
        document.querySelectorAll('.action-button')[1].addEventListener('click', function() {
            const question = document.querySelector('.question');
            const rephrasedQuestions = [
                'Which planet holds the title of being the largest in our solar system?',
                'Identify the biggest planet that orbits our Sun.',
                'What is the name of the most massive planet in our solar system?',
                'The solar system\'s largest world goes by what name?'
            ];

            const currentText = question.textContent;
            let currentIndex = rephrasedQuestions.findIndex(q => q === currentText);
            if (currentIndex === -1) currentIndex = 0;

            const nextIndex = (currentIndex + 1) % rephrasedQuestions.length;
            question.textContent = rephrasedQuestions[nextIndex];
        });
    </script>
</body>
</html>
